name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        # Intentionally minimal: the full requirements.txt pulls in
        # browser-use, playwright, pyaudio, pynput, and mss, which need
        # system libraries (audio, display) that aren't relevant to what
        # these unit tests actually exercise. Installing only what the
        # tested modules import keeps CI fast and avoids unrelated
        # platform-specific install failures.
        run: |
          python -m pip install --upgrade pip
          pip install anthropic python-dotenv cryptography

      - name: Run tests
        run: python -m unittest discover -s tests -v
